<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio 3D Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- VanillaTilt for 3D card effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
</head>
<body>
    <div class="background-anim"></div>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="glass-header">
        <div class="header-content">
            <h1><span class="gradient-text">Project Universe</span></h1>
            <p>Explore over 900+ web experiences.</p>
        </div>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search projects...">
                <div class="search-icon">🔍</div>
            </div>
            
            <div class="filter-box">
                <select id="categorySelect">
                    <option value="All">All Categories</option>
                    <!-- Options populated dynamically -->
                </select>
            </div>
        </div>
    </header>

    <main>
        <div class="project-grid" id="projectGrid">
            <!-- Project Cards Rendered Here -->
        </div>
        <div class="load-more-container">
            <button id="loadMoreBtn" class="glass-btn">Load More Projects</button>
        </div>
    </main>

    <!-- Load the data generated by node script -->
    <script src="projects_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
