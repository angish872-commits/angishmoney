<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Universe - 860+ Website Templates Gallery</title>
    <meta name="description" content="Explore over 860+ website templates across 95+ categories. Free HTML, Bootstrap, React, and Next.js templates for every industry.">
    <meta property="og:title" content="Project Universe">
    <meta property="og:description" content="860+ website templates across 95+ categories. Free and open source.">
    <meta property="og:url" content="https://angish872-commits.github.io/angishmoney/">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- VanillaTilt for 3D card effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
</head>
<body>
    <div class="background-anim"></div>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="glass-header">
        <div class="header-content">
            <h1><span class="gradient-text">Project Universe</span></h1>
            <p>Explore over 860+ web experiences.</p>
        </div>
        
        <div class="header-actions">
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search projects...">
                    <div class="search-icon">🔍</div>
                </div>
                
                <div class="filter-box">
                    <select id="categorySelect">
                        <option value="All">All Categories</option>
                        <!-- Options populated dynamically -->
                    </select>
                </div>
            </div>
            <a href="https://github.com/angish872-commits" target="_blank" class="github-btn" aria-label="GitHub Profile">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                <span>GitHub</span>
            </a>
        </div>
    </header>

    <section class="stats-bar" id="statsBar">
        <div class="stat-item">
            <span class="stat-number" data-target="860">0</span>
            <span class="stat-label">Projects</span>
        </div>
        <div class="stat-item">
            <span class="stat-number" data-target="95">0</span>
            <span class="stat-label">Categories</span>
        </div>
        <div class="stat-item">
            <span class="stat-number" data-target="7">0</span>
            <span class="stat-label">Collections</span>
        </div>
    </section>

    <main>
        <div class="project-grid" id="projectGrid">
            <!-- Project Cards Rendered Here -->
        </div>
        <div class="load-more-container">
            <button id="loadMoreBtn" class="glass-btn">Load More Projects</button>
        </div>
    </main>

    <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <footer class="site-footer">
        <div class="footer-content">
            <p>Built with ❤️ by <a href="https://github.com/angish872-commits" target="_blank" class="footer-link">angish872-commits</a></p>
            <p>&copy; 2026 Project Universe. All rights reserved.</p>
        </div>
    </footer>

    <!-- Load the data generated by node script -->
    <script src="projects_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
